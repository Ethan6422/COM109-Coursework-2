<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Spinscore - Contact</title>
		<link rel="icon" type="image/x-icon" href="../IMAGES/favicon.ico" />
		<link rel="stylesheet" href="../CSS/Webstyle.css" />
		<script type="text/javascript" src="../JS/contact.js">
		</script>
	</head>
	
	<body>
		<header>
			<div class="logo-title">
				<a href="Index.html">
					<img src="../IMAGES/Logo.png" alt="Logo">
				</a>
				<span class="site-title">Spinscore</span>
			</div>
			
			<nav>
				<a href="Index.html">About us</a>
				<a href="cds.html">CDs</a>
				<a href="DVDs.html">DVDs</a>
				<a href="reviews.html">Reviews</a>
				<a href="Contact.html" class="active">Contact Us</a>
				<a href="cart.html">Cart</a>
			</nav>
		</header>
	
		<div class="form-wrapper">
    		<p class="form-eyebrow">Get in touch</p>
        	<h1 class="form-title">Send us a message</h1>
 
    	<div class="form-fields">
        	<div>
        		<label for="name">Full name</label>
          		<input type="text" id="name" placeholder="Jane Smith" />
          		<span class="field-error" id="name-error">Please enter your full name.</span>
        	</div>
 
        <div>
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="jane@example.com" />
          <span class="field-error" id="email-error">Please enter a valid email address.</span>
        </div>
 
        <div>
        	<label for="comment">Comment</label>
        	<textarea
            id="comment"
            rows="5"
            placeholder="Write your message here…"
        	></textarea>
        	<span class="field-error" id="comment-error">Please enter a message.</span>
        </div>
 
        <div class="form-footer">
        	<p class="form-note">We'll reply within 1–2 business days.</p>
        	<button class="submit-btn" onclick="handleSubmit(this)">
            Send message
        	</button>
        </div>
    	</div>
 
    		<div class="success-msg" id="success-msg">
        	Your message was sent — thank you!
    		</div>
    	</div>
		
		<footer>
			<p> &copy; Copyright Spinscore 2026 </p>
			<button id="contrastBtn">Contrast Mode</button>
		</footer>
		<script src="../JS/accessibility.js"></script>
	</body>
</html>
