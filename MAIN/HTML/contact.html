<!DOCTYPE html>

<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Spinscore - Contact</title>
		<link rel="icon" type="image/x-icon" href="favicon.ico">
		<link rel="stylesheet" href="test.css" />
		<script type="text/javascript" src="jsjs.js">
		</script>
	</head>
	
	<body>
		<header>
		<div class="logo-title">
				<a href="Index.html">
					<img src="logo.png" alt="Logo">
				</a>
				<span class="site-title">Spinscore</span>
			</div>
			<div class="logo-title">
			<img src="img1.jpg" alt="Logo">
			</div>
			
			<nav>
				<a href="">CDs</a>
				<a href="">DVDs</a>
				<a href="">Reviews</a>
				<a href="">Cart</a>
			</nav>
		</header>
	
	<div class="form-wrapper">
      <p class="form-eyebrow">Get in touch</p>
      <h1 class="form-title">Send us a message</h1>
 
      <div class="form-fields">
        <div>
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Jane Smith" />
        </div>
 
        <div>
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="jane@example.com" />
        </div>
 
        <div>
          <label for="comment">Comment</label>
          <textarea
            id="comment"
            rows="5"
            placeholder="Write your message here…"
          ></textarea>
        </div>
 
        <div class="form-footer">
          <p class="form-note">We'll reply within 1–2 business days.</p>
          <button class="submit-btn" onclick="handleSubmit(this)">
            Send message
          </button>
        </div>
      </div>
 
      <div class="success-msg" id="success-msg">
        Your message was sent — thank you!
      </div>
    </div>
		
		
		
		
		<footer>
			<p>&copy; Copyright Spinscore 2026</p>
		</footer>
